<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindForge - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

  <style>
    :root {
      --primary: #16a34a;
      --primary-dark: #15803d;
      --primary-light: #dcfce7;
      --secondary: #6366f1;
      --secondary-dark: #4f46e5;
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #10b981;
      --dark: #0f172a;
      --light: #f8fafc;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --radius: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 80%, rgba(22, 163, 74, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
        linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body.faculty {
      --primary: #16a34a;
      --primary-dark: #15803d;
    }

    body.admin {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
    }

    /* Animated background elements */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), transparent);
      animation: float 6s ease-in-out infinite;
      opacity: 0.6;
    }

    .bg-shape:nth-child(1) {
      width: 300px;
      height: 300px;
      top: 10%;
      left: -5%;
      animation-delay: 0s;
    }

    .bg-shape:nth-child(2) {
      width: 200px;
      height: 200px;
      top: 60%;
      right: -5%;
      animation-delay: 2s;
    }

    .bg-shape:nth-child(3) {
      width: 150px;
      height: 150px;
      bottom: 20%;
      left: 10%;
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    /* Toast notifications */
    .toast {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: white;
      padding: 1rem 1.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      border-left: 4px solid var(--danger);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 500;
      color: var(--danger);
      animation: slideIn 0.3s ease-out;
      max-width: 400px;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast i {
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    /* Login card */
    .login-card {
      width: 100%;
      max-width: 480px;
      padding: 3rem;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      position: relative;
      z-index: 10;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card.shake {
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .logo i {
      font-size: 2rem;
    }

    .login-title {
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* Role switch */
    .role-switch {
      display: flex;
      background: var(--light);
      padding: 0.375rem;
      border-radius: var(--radius-lg);
      margin-bottom: 2rem;
      border: 1px solid var(--border);
    }

    .role-btn {
      flex: 1;
      padding: 0.875rem 1rem;
      border-radius: var(--radius);
      border: none;
      background: none;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .role-btn:hover:not(:disabled) {
      color: var(--text);
      background: rgba(255, 255, 255, 0.5);
    }

    .role-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: var(--shadow);
    }

    .role-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .role-btn i {
      font-size: 1rem;
    }

    /* Form inputs */
    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
      font-size: 0.875rem;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: 1rem;
      font-family: inherit;
      transition: var(--transition);
      background: white;
      color: var(--text);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
    }

    .form-input.error {
      border-color: var(--danger);
      animation: pulse 0.6s ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.1); }
      50% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.3); }
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.25rem;
      pointer-events: none;
    }

    .password-wrapper {
      position: relative;
    }

    .eye-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.25rem;
      color: var(--text-muted);
      transition: var(--transition);
      padding: 0.5rem;
      border-radius: 50%;
    }

    .eye-toggle:hover {
      color: var(--primary);
      background: var(--primary-light);
    }

    .eye-toggle.open {
      color: var(--primary);
    }

    /* Login button */
    .login-btn {
      width: 100%;
      margin-top: 2rem;
      padding: 1rem 2rem;
      border-radius: var(--radius-lg);
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: var(--transition);
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .login-btn i {
      font-size: 1.25rem;
    }

    /* Auth status */
    .auth-wait {
      margin-top: 1.5rem;
      text-align: center;
      color: var(--primary);
      font-weight: 600;
      display: none;
      animation: fadeIn 0.3s ease-out;
    }

    .auth-wait.show {
      display: block;
    }


    .demo-title {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .demo-title i {
      color: var(--accent);
    }

    .demo-credentials {
      display: grid;
      gap: 0.75rem;
    }

    .demo-cred {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 0.875rem;
    }

    .demo-role {
      font-weight: 600;
      color: var(--primary);
    }

    .demo-copy {
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
      padding: 0.25rem;
      border-radius: 0.25rem;
    }

    .demo-copy:hover {
      color: var(--primary);
      background: var(--primary-light);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .login-card {
        margin: 1rem;
        padding: 2rem 1.5rem;
      }

      .logo {
        font-size: 2rem;
      }

      .login-title {
        font-size: 1.5rem;
      }

      .bg-shape {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .role-switch {
        flex-direction: column;
      }

      .role-btn {
        padding: 0.75rem;
      }

      .demo-cred {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
    }
  </style>
</head>

<body class="faculty">
  <!-- Animated background shapes -->
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>

  <!-- Error toast -->
  {% if error %}
  <div class="toast">
    <i class='bx bx-error-circle'></i>
    {{ error }}
  </div>
  {% endif %}

  <!-- Login card -->
  <div class="login-card {% if error %}shake{% endif %}">
    <div class="login-header">
      <div class="logo">
        <i class='bx bx-brain'></i>
        MindForge
      </div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your account to continue</p>
    </div>

    <form method="POST" id="loginForm">
      <!-- Role switch -->
      <div class="role-switch">
        <button type="button" class="role-btn active" onclick="setRole('faculty', this)">
          <i class='bx bx-chalkboard'></i>
          Faculty
        </button>
        <button type="button" class="role-btn" disabled>
          <i class='bx bx-user'></i>
          Student
        </button>
        <button type="button" class="role-btn" onclick="setRole('admin', this)">
          <i class='bx bx-cog'></i>
          Admin
        </button>
      </div>

      <input type="hidden" name="role" id="role" value="faculty">

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class='bx bx-envelope input-icon'></i>
          <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper password-wrapper">
          <i class='bx bx-lock-alt input-icon'></i>
          <input type="password" id="password" name="password" class="form-input {% if error %}error{% endif %}" placeholder="Enter your password" required>
          <span class="eye-toggle" onclick="togglePassword(this)">
            <i class='bx bx-hide'></i>
          </span>
        </div>
      </div>

      <!-- Submit button -->
      <button class="login-btn" type="submit">
        <i class='bx bx-log-in'></i>
        <span>Sign In</span>
      </button>

      <!-- Auth status -->
      <div class="auth-wait" id="authWait">
        <i class='bx bx-loader-alt bx-spin'></i>
        Authenticating...
      </div>
    </form>

  <script>
    let submitting = false;
    let cachedEmail = "";

    /* Submit with delay */
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      if (submitting) return;

      e.preventDefault();
      submitting = true;

      cachedEmail = document.getElementById("email").value;

      document.getElementById("authWait").classList.add("show");
      document.querySelector(".login-btn").classList.add("loading");
      document.querySelector(".login-btn").innerHTML = '<i class="bx bx-loader-alt bx-spin"></i><span>Signing In...</span>';

      setTimeout(() => this.submit(), 2000);
    });

    /* Role switch */
    function setRole(role, el) {
      document.body.className = role;
      document.getElementById("role").value = role;

      document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
      el.classList.add("active");

      // Reset form
      document.getElementById("password").value = "";
      document.getElementById("password").classList.remove("error");
      document.getElementById("authWait").classList.remove("show");
      document.querySelector(".login-btn").classList.remove("loading");
      document.querySelector(".login-btn").innerHTML = '<i class="bx bx-log-in"></i><span>Sign In</span>';

      submitting = false;
    }

    /* Password toggle */
    function togglePassword(el) {
      const input = document.getElementById("password");
      const icon = el.querySelector('i');

      if (input.type === "password") {
        input.type = "text";
        icon.className = "bx bx-show";
      } else {
        input.type = "password";
        icon.className = "bx bx-hide";
      }

      el.classList.toggle("open");
    }

  

    /* Error handling */
    {% if error %}
      submitting = false;
      document.getElementById("email").value = "{{ request.form.email }}";
      document.getElementById("password").value = "";
      document.getElementById("authWait").classList.remove("show");
      document.querySelector(".login-btn").classList.remove("loading");
      document.querySelector(".login-btn").innerHTML = '<i class="bx bx-log-in"></i><span>Sign In</span>';
    {% endif %}

    /* Auto-focus email field */
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('email').focus();
    });
  </script>
</body>
</html>

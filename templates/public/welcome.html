<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome | AI Question Paper Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

  <style>
    :root {
      --primary: #16a34a;
      --primary-dark: #15803d;
      --primary-light: #dcfce7;
      --secondary: #6366f1;
      --secondary-dark: #4f46e5;
      --accent: #f59e0b;
      --dark: #0f172a;
      --dark-light: #1e293b;
      --light: #f8fafc;
      --bg: #f4fff4;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --radius-lg: 0.75rem;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--bg) 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Animated background shapes */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.6;
      animation: float 6s ease-in-out infinite;
    }

    .bg-shape:nth-child(1) {
      width: 300px;
      height: 300px;
      background: rgba(22, 163, 74, 0.15);
      top: 5%;
      left: -10%;
      animation-delay: 0s;
    }

    .bg-shape:nth-child(2) {
      width: 200px;
      height: 200px;
      background: rgba(99, 102, 241, 0.15);
      bottom: 10%;
      right: -5%;
      animation-delay: 2s;
    }

    .bg-shape:nth-child(3) {
      width: 150px;
      height: 150px;
      background: rgba(245, 158, 11, 0.1);
      top: 50%;
      right: 10%;
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% { 
        transform: translateY(0) rotate(0deg);
      }
      50% { 
        transform: translateY(-30px) rotate(180deg);
      }
    }

    /* Welcome card container */
    .welcome-container {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      width: 100%;
    }

    .welcome-card {
      background: var(--card);
      padding: 4rem 3rem;
      border-radius: var(--radius-lg);
      text-align: center;
      box-shadow: var(--shadow-lg);
      max-width: 540px;
      width: 100%;
      animation: slideUp 0.8s ease cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid var(--border);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(60px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    .welcome-card h1 {
      font-size: 2.5rem;
      color: var(--primary);
      margin-bottom: 1rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .welcome-card p {
      font-size: 1.05rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    .welcome-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin: 2rem 0;
      padding: 1.5rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .feature-icon {
      font-size: 1.75rem;
      color: var(--primary);
    }

    .feature-text {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-direction: column;
    }

    .enter-btn,
    .secondary-btn {
      padding: 1rem 2rem;
      font-size: 1rem;
      border-radius: var(--radius-lg);
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-block;
      font-family: 'Inter', sans-serif;
    }

    .enter-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: var(--shadow);
    }

    .enter-btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .enter-btn:active {
      transform: translateY(-1px);
    }

    .secondary-btn {
      background: var(--light);
      color: var(--text);
      border: 2px solid var(--border);
    }

    .secondary-btn:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    .features-link {
      margin-top: 1rem;
    }

    .features-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition);
    }

    .features-link a:hover {
      gap: 0.75rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .welcome-card {
        padding: 2.5rem 1.5rem;
      }

      .welcome-card h1 {
        font-size: 2rem;
      }

      .welcome-card p {
        font-size: 0.95rem;
      }

      .welcome-features {
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1rem 0;
      }

      .button-group {
        margin-top: 1.5rem;
      }

      .enter-btn,
      .secondary-btn {
        padding: 0.875rem 1.75rem;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 480px) {
      .welcome-card {
        padding: 2rem 1rem;
      }

      .welcome-card h1 {
        font-size: 1.75rem;
      }

      .welcome-icon {
        font-size: 3rem;
      }

      .welcome-features {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Background animated shapes -->
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>

  <!-- Welcome Container -->
  <div class="welcome-container">
    <div class="welcome-card">
      <div class="welcome-icon">    <i class='bx bx-brain'></i></div>
      
      <h1>    MindForge
      </h1>
      
      <p>
        AI-powered platform to create secure, curriculum-aligned question papers in minutes.
      </p>

      <div class="welcome-features">
        <div class="feature">
          <div class="feature-icon">⚡</div>
          <div class="feature-text">Fast & Smart</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🔐</div>
          <div class="feature-text">Secure</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🎯</div>
          <div class="feature-text">Accurate</div>
        </div>
      </div>

      <div class="button-group">
        <a href="{{ url_for('landing') }}" class="enter-btn">
          <i class="bx bx-chevron-right"></i>
          Enter Platform
        </a>
        <a href="/login" class="secondary-btn">
          <i class="bx bx-log-in"></i>
          Login to Account
        </a>
      </div>

      <div class="features-link">
        <a href="{{ url_for('landing') }}#learn_more">
          Learn more →
        </a>
      </div>
    </div>
  </div>

</body>

</html>
